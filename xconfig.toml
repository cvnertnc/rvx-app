# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/cvnertnc/rvx-app/blob/main/CONFIG.md for more detailed explanations
# you can use rvmm-config-gen to generate a config
# enabled = true/false

enable-magisk-update = true
parallel-jobs = 1
compression-level = 9
remove-rv-integrations-checks = true

patches-source = "anddea/revanced-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "RVX App"

patches-version = "latest"
cli-version = "latest"

[YouTube]
enabled = true
build-mode = "both"
version = "latest"
patcher-args = "-d 'Custom branding name for YouTube' -e 'Theme' -e 'Custom header for YouTube' -e 'Custom branding icon for YouTube' -OappIcon='youtube'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"

[Music]
enabled = true
build-mode = "both"
arch = "arm64-v8a"
version = "latest"
patcher-args = "-d 'Custom branding name for YouTube Music' -e 'Custom header for YouTube Music' -e 'Custom branding icon for YouTube Music' -OappIcon='youtube_music'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"

[Reddit]
enabled = false
build-mode = "apk"
arch = "arm64-v8a"
version = "latest"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/redditinc/reddit/"
# archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.reddit.frontpage"
uptodown-dlurl = "https://reddit-official-app.en.uptodown.com/android"
dpi = "120-640dpi"
